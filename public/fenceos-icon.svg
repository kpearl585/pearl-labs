<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="7" fill="#2D6A4F"/>
  <!-- Fence posts -->
  <rect x="5" y="10" width="4" height="16" rx="1" fill="white"/>
  <rect x="14" y="10" width="4" height="16" rx="1" fill="white"/>
  <rect x="23" y="10" width="4" height="16" rx="1" fill="white"/>
  <!-- Top rail -->
  <rect x="5" y="12" width="22" height="3" rx="1" fill="white"/>
  <!-- Bottom rail -->
  <rect x="5" y="19" width="22" height="3" rx="1" fill="white"/>
  <!-- Post tops (pointed) -->
  <polygon points="7,6 5,10 9,10" fill="white"/>
  <polygon points="16,6 14,10 18,10" fill="white"/>
  <polygon points="25,6 23,10 27,10" fill="white"/>
</svg>
